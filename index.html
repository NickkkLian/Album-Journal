<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300;1,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #0e0d0b;
  --s1:   #161512;
  --s2:   #1f1e1a;
  --s3:   #282620;
  --fg:   #ece6d2;
  --fg2:  #7d7565;
  --fg3:  #3e3a30;
  --brd:  #242018;
  --brd2: #343028;
  --acc:  #c89040;
  --ok:   #50b870;
  --err:  #c84040;

  --c-t0:#ff7070; --c-t1:#ffaa50; --c-t2:#ffe050;
  --c-t3:#b0e050; --c-t4:#50d880; --c-t5:#50d0d8;
  --c-t6:#7080f0; --c-t7:#a060e8; --c-t8:#c860c0; --c-tr:#c070ff;

  --t0b:#280800; --t0f:#e07040; --t0r:#803010;
  --t1b:#241400; --t1f:#d48830; --t1r:#7a4e0a;
  --t2b:#201a00; --t2f:#c8a020; --t2r:#706000;
  --t3b:#101800; --t3f:#80b020; --t3r:#3a5808;
  --t4b:#001a08; --t4f:#40b060; --t4r:#0a5820;
  --t5b:#001820; --t5f:#30b0b8; --t5r:#085060;
  --t6b:#0c0820; --t6f:#7080d8; --t6r:#201868;
  --t7b:#160820; --t7f:#9050d0; --t7r:#3a1060;
  --t8b:#200818; --t8f:#b84898; --t8r:#580830;
  --trb:#180820; --trf:#a060d8; --trr:#4a1878;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--fg);font-family:'DM Mono','Courier New',monospace;font-size:13px;line-height:1.65;min-height:100vh;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.018) 3px,rgba(0,0,0,0.018) 4px);}
#app{max-width:900px;margin:0 auto;padding:2.5rem 1.75rem 5rem;}

.display{font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-style:italic;font-size:2.4rem;letter-spacing:-0.01em;line-height:1.1;}
.album-name-lg{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:2rem;letter-spacing:-0.02em;line-height:1.1;}
.album-name{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:1.15rem;letter-spacing:-0.01em;line-height:1.2;}
.mono-label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg3);}

input,textarea{background:var(--s1);border:1px solid var(--brd);color:var(--fg);font-family:'DM Mono',monospace;font-size:13px;padding:10px 14px;border-radius:4px;outline:none;width:100%;transition:border-color 0.2s;}
input:focus,textarea:focus{border-color:var(--brd2);}
input::placeholder,textarea::placeholder{color:var(--fg3);}
textarea{resize:vertical;line-height:1.8;}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.15s;border:none;line-height:1;white-space:nowrap;}
.btn-primary{background:var(--fg);color:var(--bg);}
.btn-primary:hover{background:#d8cfba;}
.btn-ghost{background:transparent;color:var(--fg2);border:1px solid var(--brd);}
.btn-ghost:hover{border-color:var(--brd2);color:var(--fg);}
.btn-danger{background:transparent;color:var(--err);border:1px solid #5a1010;font-size:11px;padding:6px 14px;}
.btn-danger:hover{background:#200808;}
.back-btn{background:transparent;border:none;color:var(--fg2);cursor:pointer;font-size:20px;padding:0;line-height:1;transition:color 0.15s;}
.back-btn:hover{color:var(--fg);}
.icon-btn{background:transparent;border:1px solid var(--brd);color:var(--fg3);cursor:pointer;font-size:14px;padding:5px 10px;border-radius:3px;transition:all 0.15s;font-family:'DM Mono',monospace;line-height:1;}
.icon-btn:hover{border-color:var(--brd2);color:var(--fg2);}

/* tab bar */
.tab-bar{display:flex;align-items:center;border-bottom:1px solid var(--brd);margin-bottom:2rem;}
.tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--fg3);font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;padding:10px 20px;cursor:pointer;margin-bottom:-1px;transition:all 0.15s;}
.tab-btn.active{border-bottom-color:var(--acc);color:var(--fg);}
.tab-btn:hover:not(.active){color:var(--fg2);}

/* sync pill */
.sync-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:5px 10px;border-radius:3px;border:1px solid var(--brd);color:var(--fg3);cursor:default;transition:all 0.2s;}
.sync-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sync-idle   .sync-dot{background:var(--fg3);}
.sync-busy   .sync-dot{background:var(--acc);animation:pulse 1s infinite;}
.sync-ok     .sync-dot{background:var(--ok);}  .sync-ok{border-color:#1a5030;color:var(--ok);}
.sync-error  .sync-dot{background:var(--err);} .sync-error{border-color:#5a1010;color:var(--err);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* collection */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.album-card{background:var(--s1);border:1px solid var(--brd);border-radius:6px;padding:16px;cursor:pointer;transition:border-color 0.15s,background 0.15s;}
.album-card:hover{border-color:var(--brd2);background:var(--s2);}

/* badges & pills */
.tier-badge{display:inline-block;font-size:10px;letter-spacing:0.06em;padding:2px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.tb-T0{background:var(--t0b);color:var(--t0f);border:1px solid var(--t0r);}
.tb-T1{background:var(--t1b);color:var(--t1f);border:1px solid var(--t1r);}
.tb-T2{background:var(--t2b);color:var(--t2f);border:1px solid var(--t2r);}
.tb-T3{background:var(--t3b);color:var(--t3f);border:1px solid var(--t3r);}
.tb-T4{background:var(--t4b);color:var(--t4f);border:1px solid var(--t4r);}
.tb-T5{background:var(--t5b);color:var(--t5f);border:1px solid var(--t5r);}
.tb-T6{background:var(--t6b);color:var(--t6f);border:1px solid var(--t6r);}
.tb-T7{background:var(--t7b);color:var(--t7f);border:1px solid var(--t7r);}
.tb-T8{background:var(--t8b);color:var(--t8f);border:1px solid var(--t8r);}
.tb-Trash{background:var(--trb);color:var(--trf);border:1px solid var(--trr);}
.tier-pills{display:flex;gap:6px;flex-wrap:wrap;}
.tier-pill{background:transparent;border:1px solid var(--brd);color:var(--fg2);font-family:'DM Mono',monospace;font-size:11px;padding:4px 12px;border-radius:3px;cursor:pointer;transition:all 0.15s;}
.tier-pill:hover{border-color:var(--brd2);color:var(--fg);}
.tp-T0{background:var(--t0b);color:var(--t0f);border-color:var(--t0r);}
.tp-T1{background:var(--t1b);color:var(--t1f);border-color:var(--t1r);}
.tp-T2{background:var(--t2b);color:var(--t2f);border-color:var(--t2r);}
.tp-T3{background:var(--t3b);color:var(--t3f);border-color:var(--t3r);}
.tp-T4{background:var(--t4b);color:var(--t4f);border-color:var(--t4r);}
.tp-T5{background:var(--t5b);color:var(--t5f);border-color:var(--t5r);}
.tp-T6{background:var(--t6b);color:var(--t6f);border-color:var(--t6r);}
.tp-T7{background:var(--t7b);color:var(--t7f);border-color:var(--t7r);}
.tp-T8{background:var(--t8b);color:var(--t8f);border-color:var(--t8r);}
.tp-Trash{background:var(--trb);color:var(--trf);border-color:var(--trr);}

/* tracks */
.track-row{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:4px;cursor:pointer;transition:background 0.1s;}
.track-row:hover{background:var(--s2);}
.track-row.great{background:rgba(200,144,64,0.07);}
.track-row.great:hover{background:rgba(200,144,64,0.13);}
.track-num{font-size:11px;color:var(--fg3);min-width:22px;font-variant-numeric:tabular-nums;}
.track-name{flex:1;font-size:13px;}
.track-row.great .track-name{color:var(--acc);}
.star{color:var(--acc);font-size:12px;flex-shrink:0;}

/* tier list */
.tierlist-wrap{border:2px solid #2a2620;border-radius:6px;overflow:hidden;}
.tierlist-row{display:flex;align-items:stretch;border-bottom:2px solid #2a2620;min-height:100px;}
.tierlist-row:last-child{border-bottom:none;}
.tierlist-label{width:88px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:2.2rem;letter-spacing:-0.02em;color:#111;text-shadow:0 1px 3px rgba(0,0,0,0.3);border-right:2px solid #2a2620;user-select:none;text-align:center;padding:4px 6px;line-height:1.1;}
.tl-lbl-T0{background:var(--c-t0);}
.tl-lbl-T1{background:var(--c-t1);}
.tl-lbl-T2{background:var(--c-t2);}
.tl-lbl-T3{background:var(--c-t3);}
.tl-lbl-T4{background:var(--c-t4);}
.tl-lbl-T5{background:var(--c-t5);}
.tl-lbl-T6{background:var(--c-t6);color:#eee;text-shadow:0 1px 3px rgba(0,0,0,0.3);}
.tl-lbl-T7{background:var(--c-t7);color:#eee;text-shadow:0 1px 3px rgba(0,0,0,0.4);}
.tl-lbl-T8{background:var(--c-t8);color:#eee;text-shadow:0 1px 3px rgba(0,0,0,0.4);}
.tl-lbl-Trash{background:var(--c-tr);color:#eee;text-shadow:0 1px 3px rgba(0,0,0,0.5);}
.tierlist-items{flex:1;display:flex;flex-wrap:wrap;align-content:flex-start;gap:6px;padding:8px 10px;background:#111009;}
.tl-tile{width:108px;min-height:80px;background:#1c1b18;border:1px solid #2e2b24;border-radius:4px;padding:8px;cursor:pointer;transition:background 0.15s,border-color 0.15s;display:flex;flex-direction:column;justify-content:space-between;gap:4px;}
.tl-tile:hover{background:#262420;border-color:#46423a;}
.tl-tile-name{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:1rem;line-height:1.2;color:var(--fg);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.tl-tile-meta{font-size:11px;color:#6a6055;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl-tile-star{font-size:9px;color:var(--acc);}
.tl-empty{padding:10px 16px;font-size:11px;color:var(--fg3);font-style:italic;align-self:center;}
.unranked-wrap{margin-top:1.5rem;}
.unranked-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--brd);}
.unranked-tiles{display:flex;flex-wrap:wrap;gap:6px;}

/* settings */
.callout{background:var(--s1);border:1px solid var(--brd);border-left:3px solid var(--acc);border-radius:4px;padding:14px 16px;font-size:12px;color:var(--fg2);line-height:1.8;}
.callout a{color:var(--acc);text-decoration:none;}
.callout a:hover{text-decoration:underline;}
.callout code{background:var(--s2);padding:1px 5px;border-radius:2px;font-size:11px;color:var(--fg);}
.s-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.s-row label{font-size:11px;color:var(--fg3);width:80px;flex-shrink:0;}
.s-row input{flex:1;}
.test-result{font-size:12px;padding:8px 12px;border-radius:4px;margin-top:10px;display:none;}
.test-ok{background:var(--t4b);color:var(--ok);border:1px solid var(--t4r);display:block;}
.test-err{background:var(--t0b);color:var(--err);border:1px solid var(--t0r);display:block;}

/* onboarding */
.onboard-step{display:flex;gap:14px;margin-bottom:1.25rem;}
.onboard-num{width:24px;height:24px;border-radius:50%;background:var(--s3);border:1px solid var(--brd2);color:var(--fg2);font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.onboard-text{font-size:12px;color:var(--fg2);line-height:1.7;}
.onboard-text a{color:var(--acc);text-decoration:none;}
.onboard-text a:hover{text-decoration:underline;}
.onboard-text code{background:var(--s2);padding:1px 5px;border-radius:2px;font-size:11px;color:var(--fg);}

/* misc */
.field{margin-bottom:1.25rem;}
.field>label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg3);margin-bottom:6px;}
.meta-chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.chip{font-size:11px;color:var(--fg3);}
.divider{height:1px;background:var(--brd);margin:1.5rem 0;}
.empty{text-align:center;padding:4rem 1rem;color:var(--fg3);}
.empty-icon{font-size:2.5rem;display:block;margin-bottom:1rem;opacity:0.35;}
.search-wrap{position:relative;margin-bottom:1.5rem;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--fg3);pointer-events:none;font-size:14px;}
.link-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid var(--brd);border-radius:4px;font-size:12px;color:var(--fg2);text-decoration:none;margin-bottom:1.5rem;transition:border-color 0.15s,color 0.15s;}
.link-btn:hover{border-color:var(--brd2);color:var(--fg);}

/* drag and drop */
.tl-tile[draggable]{cursor:grab;}
.tl-tile.drag-over{outline:2px dashed var(--acc);outline-offset:2px;}
.tl-tile.dragging{opacity:0.3;}
.tierlist-items.tier-drag-over,.unranked-tiles.tier-drag-over{outline:2px dashed var(--acc);outline-offset:-2px;}

/* by year */
.year-section{margin-bottom:2rem;}
.year-heading{font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-style:italic;font-size:1.6rem;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--brd);}
.year-table{width:100%;border-collapse:collapse;}
.year-table td{padding:8px 10px;border-bottom:1px solid var(--brd);vertical-align:middle;}
.year-table tr:last-child td{border-bottom:none;}
.year-table tr{cursor:pointer;}
.year-table tr:hover td{background:var(--s1);}
.yt-rank{width:76px;}
.yt-name{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:1rem;}
.yt-artist{color:var(--fg2);font-size:12px;}
.yt-fav{color:var(--acc);font-size:11px;text-align:right;white-space:nowrap;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px;}
/* [hub-mobile] 手机端：标签栏横向滚动不裁切 */
@media (max-width:640px){
  .tab-bar{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tab-btn{white-space:nowrap;flex:0 0 auto;padding:10px 14px;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let albums    = [];
let view      = 'main';
let activeTab = 'collection';
let search    = '';
let detailId  = null;
let addStep   = 1;
let addForm   = {name:'',artist:'',year:'',genre:'',link:'',tier:'',tracksText:'',great:[]};

let ghConfig  = {token:'',owner:'',repo:'',path:'albums.json'};
let ghSha     = null;
let syncState = 'idle';
let syncMsg   = (localStorage.getItem('pha-lang')==='en'?'Not set up':'未设置');
let syncTimer = null;

const TIERS     = ['T0','T1','T2','T3','T4','T5','T6','T7','T8','Trash'];
const TIER_DESC = {T0:'Essential',T1:'Amazing',T2:'Great',T3:'Good',T4:'Decent',T5:'Okay',T6:'Meh',T7:'Weak',T8:'Barely',Trash:'Not for me'};
const TIER_RANK = {T0:0,T1:1,T2:2,T3:3,T4:4,T5:5,T6:6,T7:7,T8:8,Trash:9};
function tierRank(t){ return t!=null ? (TIER_RANK[t]??9) : 10; }

// ─────────────────────────────────────────────
// 双语 i18n（全站共享 pha-lang，默认 zh）。本 app 原生英文，中文为新增译文。
// TIERS（T0…Trash）是存储值，保持不变；TIER_DESC 中文版仅供显示，原版仍供 showcase 导出。
// ─────────────────────────────────────────────
let lang = (() => { try { return localStorage.getItem('pha-lang') === 'en' ? 'en' : 'zh'; } catch { return 'zh'; } })();
const T = (zh, en) => lang === 'en' ? en : zh;
const TIER_DESC_ZH = {T0:'必听',T1:'惊艳',T2:'很棒',T3:'不错',T4:'还行',T5:'一般',T6:'平淡',T7:'较弱',T8:'勉强',Trash:'不合我'};
const tierDesc = t => lang === 'en' ? (TIER_DESC[t] || t) : (TIER_DESC_ZH[t] || TIER_DESC[t] || t);
function toggleLang(){
  lang = lang === 'en' ? 'zh' : 'en';
  try { localStorage.setItem('pha-lang', lang); } catch {}
  document.documentElement.lang = lang === 'en' ? 'en' : 'zh';
  render();
}

let dragId   = null;
let dragTier = null;

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ─────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────
function loadLocal(){ try{const s=localStorage.getItem('alj-data');if(s)albums=JSON.parse(s);}catch(e){} }
function saveLocal(){ try{localStorage.setItem('alj-data',JSON.stringify(albums));}catch(e){} }
function loadGHConfig(){ try{const s=localStorage.getItem('alj-gh');if(s)ghConfig={...ghConfig,...JSON.parse(s)};}catch(e){}
  /* [hub-portal] 从共享配置 pha-config 补全 owner/repo/token（仅填空缺，不覆盖已填，不改 path） */
  try{var _pha=JSON.parse(localStorage.getItem('pha-config')||'null');if(_pha){if(!ghConfig.owner&&_pha.owner)ghConfig.owner=_pha.owner;if(!ghConfig.repo&&_pha.repo)ghConfig.repo=_pha.repo;if(!ghConfig.token&&_pha.token)ghConfig.token=_pha.token;}}catch(e){} }
function saveGHConfig(){ localStorage.setItem('alj-gh',JSON.stringify(ghConfig)); }
function ghReady(){ return !!(ghConfig.token&&ghConfig.owner&&ghConfig.repo&&ghConfig.path); }

// ─────────────────────────────────────────────
// GITHUB API
// ─────────────────────────────────────────────
function b64enc(str){
  // handles unicode (Chinese, etc.)
  return btoa(new TextEncoder().encode(str).reduce((s,b)=>s+String.fromCharCode(b),''));
}
function b64dec(b64){
  const bytes=Uint8Array.from(atob(b64.replace(/\n/g,'')),c=>c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}
function ghH(){
  return {'Authorization':`Bearer ${ghConfig.token}`,'Accept':'application/vnd.github+json','Content-Type':'application/json','X-GitHub-Api-Version':'2022-11-28'};
}
function ghURL(){
  return `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${ghConfig.path}`;
}

async function ghLoad(){
  if(!ghReady()) return;
  setSync('busy',T('加载中…','Loading…'));
  try{
    const res=await fetch(ghURL(),{headers:ghH()});
    if(res.status===404){ setSync('ok',T('已连接 — 首次保存时创建文件','Connected — will create file on first save')); ghSha=null; return; }
    if(!res.ok) throw new Error(`${res.status} ${(await res.json()).message}`);
    const d=await res.json();
    ghSha=d.sha;
    albums=JSON.parse(b64dec(d.content));
    saveLocal();
    setSync('ok',T(`已加载 — ${albums.length} 张专辑`,`Loaded — ${albums.length} albums`));
    render();
  }catch(e){
    setSync('error',T('加载失败：','Load failed: ')+e.message);
  }
}

async function ghPush(){
  if(!ghReady()) return;
  setSync('busy',T('同步中…','Syncing…'));
  const body={message:`album-journal sync ${new Date().toISOString().slice(0,16).replace('T',' ')}`,content:b64enc(JSON.stringify(albums,null,2))};
  if(ghSha) body.sha=ghSha;
  try{
    const res=await fetch(ghURL(),{method:'PUT',headers:ghH(),body:JSON.stringify(body)});
    if(!res.ok){
      const err=await res.json();
      // SHA conflict — fetch current and retry once
      if(res.status===409||res.status===422){
        const cur=await fetch(ghURL(),{headers:ghH()});
        if(cur.ok){ghSha=(await cur.json()).sha;await ghPush();return;}
      }
      throw new Error(`${res.status} ${err.message}`);
    }
    const d=await res.json();
    ghSha=d.content.sha;
    const t=new Date();
    setSync('ok',T('已同步 ','Synced ')+`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`);
  }catch(e){
    setSync('error',T('同步失败：','Sync failed: ')+e.message);
  }
}

async function ghTest(){
  const el=document.getElementById('test-result');
  if(!el) return;
  // read current form values
  ghConfig.token=document.getElementById('s-token')?.value||ghConfig.token;
  ghConfig.owner=document.getElementById('s-owner')?.value||ghConfig.owner;
  ghConfig.repo=document.getElementById('s-repo')?.value||ghConfig.repo;
  ghConfig.path=document.getElementById('s-path')?.value||ghConfig.path;
  el.className='test-result';el.textContent=T('测试中…','Testing…');el.style.display='block';
  try{
    const res=await fetch(`https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}`,{headers:ghH()});
    if(!res.ok) throw new Error(`${res.status}: ${(await res.json()).message}`);
    const d=await res.json();
    el.className='test-result test-ok';
    el.textContent=T('✓ 已连接到 "','✓ Connected to "')+d.full_name+'" ('+(d.private?T('私有','private'):T('公开','public'))+')';
  }catch(e){
    el.className='test-result test-err';
    el.textContent=`✗ ${e.message}`;
  }
}

function onDragOver(e,id){

  clearDragVisuals();

}
function onDragEnd(){ clearDragVisuals(); dragId=null; dragTier=null; }

function onDrop(e,targetId,targetTier){
  e.preventDefault(); e.stopPropagation();
  clearDragVisuals();
  if(!dragId||dragId===targetId) return;
  const drag=albums.find(a=>a.id===dragId); if(!drag) return;
  drag.tier=targetTier||null;
  const oldPos=albums.indexOf(drag);
  albums=albums.filter(a=>a.id!==dragId);
  const newTargetPos=albums.findIndex(a=>a.id===targetId);
  albums.splice(oldPos<albums.indexOf(albums.find(a=>a.id===targetId))?newTargetPos+1:newTargetPos,0,drag);
  dragId=null; save(); render();
}
function onDropOnTier(e,tier){
  e.preventDefault();
  clearDragVisuals();
  if(!dragId) return;
  const drag=albums.find(a=>a.id===dragId); if(!drag) return;
  drag.tier=tier||null;
  albums=albums.filter(a=>a.id!==dragId);
  // Insert after last album of that tier, or at end
  let idx=albums.length;
  for(let i=albums.length-1;i>=0;i--){ if((albums[i].tier||'')===(tier||'')){ idx=i+1; break; } }
  albums.splice(idx,0,drag);
  dragId=null; save(); render();
}

// ─────────────────────────────────────────────
// CANVAS EXPORT
// ─────────────────────────────────────────────
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function fitText(ctx,text,maxW){
  if(ctx.measureText(text).width<=maxW) return text;
  while(text.length>1&&ctx.measureText(text+'…').width>maxW) text=text.slice(0,-1);
  return text+'…';
}
function wrapText(ctx,text,maxW,maxLines){
  const words=text.split(' '); const lines=[]; let line='';
  for(const w of words){
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW&&line){ lines.push(line); line=w; if(lines.length>=maxLines-1){break;} }
    else line=test;
  }
  if(line) lines.push(lines.length>=maxLines?fitText(ctx,line,maxW):line);
  return lines.slice(0,maxLines);
}

function exportTierImage(){
  const DPR=2, CW=1100, LABEL_W=96, BORDER=2, GAP=6, PAD=8;
  const TW=126, TH=90, HEADER_H=64;
  const AREA_W=CW-LABEL_W-BORDER;
  const TPR=Math.floor((AREA_W-GAP)/(TW+GAP)); // tiles per row

  const TLABELS={T0:'#ff7070',T1:'#ffaa50',T2:'#ffe050',T3:'#b0e050',T4:'#50d880',T5:'#50d0d8',T6:'#7080f0',T7:'#a060e8',T8:'#c860c0',Trash:'#c070ff'};
  const DARK_LABEL=new Set(['T6','T7','T8','Trash']);
  const BG='#0e0d0b',SURF='#1c1b18',BRD='#2e2b24',ROWBG='#111009',ROWBRD='#2a2620';
  const FG='#ece6d2',FG2='#6a6055',ACC='#c89040';

  const rowHeights=TIERS.map(tier=>{
    const n=albums.filter(a=>a.tier===tier).length;
    return Math.max(TH+GAP*2, Math.ceil(Math.max(n,1)/TPR)*(TH+GAP)+GAP);
  });
  const totalH=HEADER_H+rowHeights.reduce((s,h)=>s+h+BORDER,0)+BORDER;

  const canvas=document.createElement('canvas');
  canvas.width=CW*DPR; canvas.height=totalH*DPR;
  const ctx=canvas.getContext('2d'); ctx.scale(DPR,DPR);

  // bg
  ctx.fillStyle=BG; ctx.fillRect(0,0,CW,totalH);

  // header
  ctx.fillStyle=FG; ctx.font='italic 300 28px Georgia,serif'; ctx.textBaseline='middle';
  ctx.fillText('Album Journal',20,HEADER_H*0.45);
  ctx.fillStyle=FG2; ctx.font='11px monospace';
  ctx.fillText(T(`${albums.filter(a=>a.tier).length} 已排名  ·  ${albums.length} 总计`,`${albums.filter(a=>a.tier).length} ranked  ·  ${albums.length} total`),20,HEADER_H*0.78);

  let y=HEADER_H;
  TIERS.forEach((tier,ti)=>{
    const h=rowHeights[ti];
    const ta=albums.filter(a=>a.tier===tier);

    // row top border
    ctx.fillStyle=ROWBRD; ctx.fillRect(0,y,CW,BORDER); y+=BORDER;

    // label bg
    ctx.fillStyle=TLABELS[tier]||'#888'; ctx.fillRect(0,y,LABEL_W,h);
    // label text
    ctx.fillStyle=DARK_LABEL.has(tier)?'#eeeeee':'#111111';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`600 ${tier.length>2?'15':'24'}px Georgia,serif`;
    ctx.fillText(tier,LABEL_W/2,y+h/2); ctx.textAlign='left';

    // label/tile border
    ctx.fillStyle=ROWBRD; ctx.fillRect(LABEL_W,y,BORDER,h);

    // tiles bg
    ctx.fillStyle=ROWBG; ctx.fillRect(LABEL_W+BORDER,y,CW-LABEL_W-BORDER,h);

    if(!ta.length){
      ctx.fillStyle=FG2; ctx.font='italic 12px Georgia,serif'; ctx.textBaseline='middle';
      ctx.fillText('—',LABEL_W+BORDER+16,y+h/2);
    } else {
      ta.forEach((album,i)=>{
        const col=i%TPR, row=Math.floor(i/TPR);
        const tx=LABEL_W+BORDER+GAP+col*(TW+GAP);
        const ty=y+GAP+row*(TH+GAP);

        // tile bg + border
        ctx.fillStyle=SURF; roundRect(ctx,tx,ty,TW,TH,4); ctx.fill();
        ctx.strokeStyle=BRD; ctx.lineWidth=1; roundRect(ctx,tx,ty,TW,TH,4); ctx.stroke();

        // album name (up to 2 lines)
        ctx.fillStyle=FG; ctx.font=`500 12px Georgia,serif`; ctx.textBaseline='top';
        const nameLines=wrapText(ctx,album.name,TW-PAD*2,2);
        nameLines.forEach((ln,li)=>ctx.fillText(ln,tx+PAD,ty+PAD+li*15));

        // artist
        const ay=ty+TH-PAD-(album.tracks.some(t=>t.isGreat)?22:10);
        if(album.artist){
          ctx.fillStyle=FG2; ctx.font='10px monospace'; ctx.textBaseline='top';
          ctx.fillText(fitText(ctx,album.artist,TW-PAD*2),tx+PAD,ay);
        }

        // favs
        const gc=album.tracks.filter(t=>t.isGreat).length;
        if(gc){
          ctx.fillStyle=ACC; ctx.font='9px monospace'; ctx.textBaseline='top';
          ctx.fillText(`★ ${gc}`,tx+PAD,ty+TH-PAD-10);
        }
      });
    }
    y+=h;
  });
  // bottom border
  ctx.fillStyle=ROWBRD; ctx.fillRect(0,y,CW,BORDER);

  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='tier-list.png'; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
  },'image/png');
}

}
function renderRankings(){
  if(!albums.filter(a=>!a.shelved).length) return `<div class="empty"><span class="empty-icon">◈</span><div style="font-size:13px;">${T("添加专辑以开始排名。","Add albums to start ranking.")}</div></div>`;
  const rows=TIERS.map(tier=>{
    const ta=albums.filter(a=>!a.shelved&&a.tier===tier);
    return `<div class="tierlist-row">
      <div class="tierlist-label tl-lbl-${cls(tier)}">${esc(tier)}</div>
      <div class="tierlist-items" data-tier="${esc(tier)}"
        ondragover="onDragOverTier(event,'${esc(tier)}')"
        ondrop="onDropOnTier(event,'${esc(tier)}')">
        ${ta.length?ta.map(a=>albumTile(a,tier)).join(''):'<span class="tl-empty">—</span>'}
      </div>
    </div>`;
  }).join('');
  const un=albums.filter(a=>!a.shelved&&!a.tier);
  const uS=un.length?`<div class="unranked-wrap">
    <div class="unranked-header"><span class="mono-label">${T("未排名","Unranked")}</span><span style="font-size:11px;color:var(--fg3);">${un.length}</span></div>
    <div class="unranked-tiles" ondragover="onDragOverTier(event,'')" ondrop="onDropOnTier(event,'')">
      ${un.map(a=>albumTile(a,'')).join('')}
    </div>
  </div>`:'';
  return `
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
      <button class="btn btn-ghost" onclick="exportTierImage()" style="font-size:11px;padding:6px 14px;">↓ ${T("导出为图片","Export as image")}</button>
    </div>
    <div class="tierlist-wrap">${rows}</div>${uS}`;
}

// ─────────────────────────────────────────────
// RENDER: BY YEAR
// ─────────────────────────────────────────────
function renderByYear(){
  const active=albums.filter(a=>!a.shelved);
  if(!active.length) return `<div class="empty"><span class="empty-icon">◈</span><div style="font-size:13px;">${T("还没有专辑。","No albums yet.")}</div></div>`;
  const byYear={};
  active.forEach(a=>{
    const y=a.releaseYear||'__unknown__';
    if(!byYear[y]) byYear[y]=[];
    byYear[y].push(a);
  });
  const years=Object.keys(byYear).sort((a,b)=>{
    if(a==='__unknown__') return 1;
    if(b==='__unknown__') return -1;
    return Number(b)-Number(a);
  });
  return years.map(year=>{
    const list=[...byYear[year]].sort((a,b)=>tierRank(a.tier)-tierRank(b.tier));
    const rows=list.map(a=>{
      const gc=a.tracks.filter(t=>t.isGreat).length;
      return `<tr onclick="openDetail('${a.id}')">
        <td class="yt-rank">${tierBadge(a.tier)||'<span style="font-size:11px;color:var(--fg3)">—</span>'}</td>
        <td class="yt-name">${esc(a.name)}</td>
        <td class="yt-artist">${esc(a.artist||'')}</td>
        <td class="yt-fav">${gc?`★ ${gc}`:''}</td>
      </tr>`;
    }).join('');
    return `<div class="year-section">
      <div class="year-heading">${year==='__unknown__'?T('未知年份','Unknown'):esc(year)}</div>
      <table class="year-table"><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
// RENDER: SHELVED
// ─────────────────────────────────────────────
function renderShelved(){
  const list=albums.filter(a=>a.shelved);
  if(!list.length) return `<div class="empty">
    <span class="empty-icon">◫</span>
    <div style="font-size:13px;">${T("还没有搁置的专辑。","Nothing shelved yet.")}</div>
    <div style="font-size:11px;margin-top:6px;color:var(--fg3);">${T('打开任意专辑点「搁置」即可移到这里。','Open any album and hit "Shelve" to move it here.')}</div>
  </div>`;
  return `<div style="display:flex;flex-direction:column;gap:8px;">
    ${list.map(a=>`
      <div style="display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--s1);border:1px solid var(--brd);border-radius:6px;">
        <div style="flex:1;min-width:0;">
          <div class="album-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(a.name)}</div>
          <div style="font-size:11px;color:var(--fg2);margin-top:2px;">${esc(a.artist||'—')}${a.releaseYear?' · '+esc(a.releaseYear):''}${a.genre?' · '+esc(a.genre):''}</div>
          ${a.shelvedNote?`<div style="font-size:11px;color:var(--fg3);margin-top:4px;font-style:italic;">"${esc(a.shelvedNote)}"</div>`:''}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;">
          ${a.link?`<a href="${esc(a.link)}" target="_blank" rel="noreferrer" style="font-size:11px;color:var(--fg3);text-decoration:none;padding:4px 8px;border:1px solid var(--brd);border-radius:3px;">↗</a>`:''}
          <button onclick="unshelveAlbum('${a.id}')" style="font-size:11px;background:transparent;color:var(--ok);border:1px solid #1a5030;border-radius:3px;padding:4px 10px;cursor:pointer;">${T("恢复","Restore")}</button>
          <button onclick="deleteAlbum('${a.id}')" style="font-size:11px;background:transparent;color:var(--err);border:1px solid #5a1010;border-radius:3px;padding:4px 10px;cursor:pointer;">${T("删除","Delete")}</button>
        </div>
      </div>`).join('')}
  </div>`;
}

// ─────────────────────────────────────────────
// RENDER: ADD FORM
// ─────────────────────────────────────────────
function renderAddForm(){
  return `<div style="max-width:520px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:2.5rem;">
      <button class="back-btn" onclick="cancelAdd()">←</button>
      <div class="display" style="font-size:1.7rem;">${T("添加专辑","Add album")}</div>
      <div class="mono-label" style="margin-left:auto;">${T("第","Step")} ${addStep} / 2</div>
    </div>
    ${addStep===1?renderStep1():renderStep2()}
  </div>`;
}
function renderStep1(){
  return `
    <div class="field"><label>${T("专辑名 *","Album name *")}</label><input id="f-name" type="text" placeholder="e.g. OK Computer" value="${esc(addForm.name)}" oninput="addForm.name=this.value"></div>
    <div class="field"><label>${T("艺人","Artist")}</label><input type="text" placeholder="e.g. Radiohead" value="${esc(addForm.artist)}" oninput="addForm.artist=this.value"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="field"><label>${T("发行年份","Release year")}</label><input type="text" placeholder="1997" value="${esc(addForm.year)}" oninput="addForm.year=this.value"></div>
      <div class="field"><label>${T("流派","Genre")}</label><input type="text" placeholder="${T('艺术摇滚','Art rock')}" value="${esc(addForm.genre)}" oninput="addForm.genre=this.value"></div>
    </div>
    <div class="field"><label>${T("网易云 / QQ 音乐链接","NetEase / QQ Music link")}</label><input type="url" placeholder="https://music.163.com/album?id=…" value="${esc(addForm.link)}" oninput="addForm.link=this.value"></div>
    <div class="field"><label>${T("等级（可选）","Tier (optional)")}</label><div class="tier-pills">${tierPillsHTML(addForm.tier,'toggleAddTier',false)}</div></div>
    <div style="margin-top:1.5rem;"><button class="btn btn-primary" onclick="goStep2()" style="width:100%;">${T("下一步 — 添加曲目 →","Next — add tracks →")}</button></div>`;
}
function renderStep2(){
  const tl=addForm.tracksText.split('\n').map(t=>t.trim()).filter(Boolean);
  return `
    <div class="field"><label>${T("曲目表 — 每行一首","Tracklist — one track per line")}</label><textarea id="f-tracks" rows="10" placeholder="Airbag&#10;Paranoid Android&#10;Subterranean Homesick Alien&#10;…" oninput="onTracksInput(this.value)">${esc(addForm.tracksText)}</textarea></div>
    <div id="fav-section" style="${tl.length?'':'display:none'}">
      <div class="field" style="margin-top:0.5rem;"><label>${T("★ 点击曲目标记最爱","★ Click tracks to mark favourites")}</label><div id="track-list-add" style="margin-top:6px;">${buildTrackListAdd(tl)}</div></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:1.5rem;">
      <button class="btn btn-ghost" onclick="addStep=1;render()" style="min-width:110px;">← ${T("返回","Back")}</button>
      <button class="btn btn-primary" onclick="saveAlbum()" style="flex:1;">${T("保存专辑","Save album")}</button>
    </div>`;
}
function buildTrackListAdd(tl){
  return tl.map((t,i)=>{const g=addForm.great.includes(i);return `<div class="track-row${g?' great':''}" onclick="toggleGreatAdd(${i})"><span class="track-num">${String(i+1).padStart(2,'0')}</span><span class="track-name">${esc(t)}</span>${g?'<span class="star">★</span>':''}</div>`;}).join('');
}

// ─────────────────────────────────────────────
// RENDER: DETAIL
// ─────────────────────────────────────────────
function renderDetail(){
  const a=albums.find(x=>x.id===detailId);
  if(!a){view='main';render();return '';}
  const gc=a.tracks.filter(t=>t.isGreat).length;
  return `<div style="max-width:520px;margin:0 auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;">
      <button class="back-btn" onclick="view='main';render()">←</button>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" style="font-size:11px;padding:6px 14px;" onclick="promptShelve('${a.id}')">${a.shelved?T('取消搁置','Unshelve'):T('搁置','Shelve')}</button>
        <button class="btn btn-danger" onclick="deleteAlbum('${a.id}')">${T("删除","Delete")}</button>
      </div>
    </div>
    <div class="album-name-lg" style="margin-bottom:6px;">${esc(a.name)}</div>
    ${a.artist?`<div style="font-size:15px;color:var(--fg2);margin-bottom:10px;">${esc(a.artist)}</div>`:''}
    <div class="meta-chips" style="margin-bottom:1.5rem;" id="meta-chips">
      ${a.releaseYear?`<span class="chip">${esc(a.releaseYear)}</span>`:''}
      ${a.genre?`<span class="chip">${a.releaseYear?'·':''} ${esc(a.genre)}</span>`:''}
      ${a.tracks.length?`<span class="chip">· ${a.tracks.length} ${T('首','tracks')}</span>`:''}
      ${gc?`<span class="chip" style="color:var(--acc);" id="gc-chip">· ★ ${gc} ${T('最爱','fav'+(gc!==1?'s':''))}</span>`:''}
    </div>
    ${a.link?`<a href="${esc(a.link)}" target="_blank" rel="noreferrer" class="link-btn">↗ ${T("在音乐 App 打开","Open in music app")}</a>`:''}
    ${a.shelved?`
    <div class="divider"></div>
    <div style="background:var(--s1);border:1px solid var(--brd);border-left:3px solid var(--fg3);border-radius:4px;padding:12px 14px;">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--fg3);margin-bottom:6px;">${T("已搁置","Shelved")}</div>
      <input type="text" placeholder="${T('为什么？（可选备注）','Why? (optional note)')}" value="${esc(a.shelvedNote||'')}"
        oninput="updateShelvedNote('${a.id}',this.value)"
        style="background:transparent;border:none;border-bottom:1px solid var(--brd);border-radius:0;padding:4px 0;font-size:13px;color:var(--fg2);">
    </div>`:`
    <div class="divider"></div>
    <div class="field"><label>${T("等级","Tier")}</label><div class="tier-pills" id="detail-tier-pills">${tierPillsHTML(a.tier||'','setDetailTier',true)}</div></div>`}
    <div class="divider"></div>
    ${a.tracks.length?`<div><div class="mono-label" style="margin-bottom:10px;">${T('曲目表','Tracklist')}${a.shelved?'':T(' — 点击切换最爱',' — click to toggle favourites')}</div><div id="detail-tracks">${a.tracks.map((t,i)=>`<div class="track-row${t.isGreat?' great':''}" ${a.shelved?'':'onclick="toggleGreatDetail(\''+t.id+'\')"'}><span class="track-num">${String(i+1).padStart(2,'0')}</span><span class="track-name">${esc(t.name)}</span>${t.isGreat?'<span class="star">★</span>':''}</div>`).join('')}</div></div>`:`<div style="font-size:12px;color:var(--fg3);font-style:italic;">${T("未记录曲目。","No tracks recorded.")}</div>`}
    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:11px;color:var(--fg3);">${T("纳入公开展示导出","Include in public showcase export")}</span>
      <button onclick="togglePublic('${a.id}')" style="font-size:11px;padding:4px 14px;border-radius:3px;cursor:pointer;border:1px solid ${a.public?'#1a5030':'var(--brd)'};background:${a.public?'rgba(80,184,112,0.12)':'transparent'};color:${a.public?'var(--ok)':'var(--fg3)'};">${a.public?T('✓ 公开','✓ Public'):T('设为公开','Make public')}</button>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(view==='main')          app.innerHTML=renderMain();
  else if(view==='settings') app.innerHTML=renderSettings();
  else if(view==='add')      app.innerHTML=renderAddForm();
  else if(view==='detail')   app.innerHTML=renderDetail();
  if(view==='add'&&addStep===1){const el=document.getElementById('f-name');if(el)setTimeout(()=>el.focus(),50);}
}

function setTab(t){activeTab=t;render();}
function startAdd(){addStep=1;addForm={name:'',artist:'',year:'',genre:'',link:'',tier:'',tracksText:'',great:[]};view='add';render();}
function cancelAdd(){view='main';render();}
function toggleAddTier(t){addForm.tier=addForm.tier===t?'':t;const p=document.querySelector('.tier-pills');if(p)p.innerHTML=tierPillsHTML(addForm.tier,'toggleAddTier',false);}
function goStep2(){if(!addForm.name.trim())return;addStep=2;render();}
function onTracksInput(v){
  addForm.tracksText=v;
  const tl=v.split('\n').map(s=>s.trim()).filter(Boolean);
  addForm.great=addForm.great.filter(i=>i<tl.length);
  const c=document.getElementById('track-list-add');const s=document.getElementById('fav-section');
  if(c)c.innerHTML=buildTrackListAdd(tl);if(s)s.style.display=tl.length?'':'none';
}
function toggleGreatAdd(i){
  const idx=addForm.great.indexOf(i);if(idx>=0)addForm.great.splice(idx,1);else addForm.great.push(i);
  const c=document.getElementById('track-list-add');
  if(c){const tl=addForm.tracksText.split('\n').map(s=>s.trim()).filter(Boolean);c.innerHTML=buildTrackListAdd(tl);}
}
function saveAlbum(){
  if(!addForm.name.trim())return;
  const tl=addForm.tracksText.split('\n').map(s=>s.trim()).filter(Boolean);
  albums.unshift({id:uid(),name:addForm.name.trim(),artist:addForm.artist.trim(),releaseYear:addForm.year.trim(),genre:addForm.genre.trim(),link:addForm.link.trim(),tracks:tl.map((t,i)=>({id:uid(),name:t,isGreat:addForm.great.includes(i)})),tier:addForm.tier||null,public:false,addedAt:Date.now()});
  save();view='main';render();
}
function togglePublic(id){
  const a=albums.find(x=>x.id===id);if(!a)return;
  a.public=!a.public;save();render();
}
function exportShowcase(){
  const pub=albums.filter(a=>a.public&&!a.shelved);
  if(!pub.length){alert(T('还没有标记为公开的专辑。\n打开一个专辑，在底部切换「设为公开」。','No albums marked as public yet.\nOpen an album and toggle "Make public" at the bottom.'));return;}
  // Group by tier for sections; unranked goes last
  const grouped={};
  pub.forEach(a=>{const k=a.tier||'unranked';if(!grouped[k])grouped[k]=[];grouped[k].push(a);});
  const tierOrder=[...TIERS,'unranked'];
  const sections=tierOrder.filter(k=>grouped[k]).map(k=>({
    type:k.toLowerCase().replace(/\s+/g,'-'),
    label:k==='unranked'?'Unranked':`${k} — ${TIER_DESC[k]||k}`,
    items:grouped[k].map(a=>({
      id:a.id,
      name:a.name,
      summary:[a.artist,a.releaseYear].filter(Boolean).join(' · '),
      category:a.tier||'',
      content:a.tracks.length
        ?a.tracks.map((t,i)=>`${String(i+1).padStart(2,'0')}. ${t.name}${t.isGreat?' ★':''}`).join('\n')
        :'',
      tags:a.genre?[a.genre]:[],
      updatedAt:a.addedAt?new Date(a.addedAt).toISOString():''
    }))
  }));
  const payload={
    dbId:'album-journal',
    title:'Album Journal',
    generatedAt:new Date().toISOString(),
    sections
  };
  publishPublic('album-journal.public.json',JSON.stringify(payload,null,2),pub.length);
}

// Publish public data straight to the GitHub data repo (same repo as main sync, root path);
// falls back to a local download when GitHub is not configured or the publish fails.
async function publishPublic(filename,json,count){
  if(ghReady()){
    try{
      setSync('busy',T('发布中…','Publishing…'));
      const PUBLIC_REPO='Database-Public'; // 公开数据专用仓库（public）——网站只从这里读取，碰不到私有库
      const url=`https://api.github.com/repos/${ghConfig.owner}/${PUBLIC_REPO}/contents/${filename}`;
      const head=await fetch(url,{headers:ghH()});
      const sha=head.ok?(await head.json()).sha:undefined;
      const body={message:`publish ${filename} (${count} entries)`,content:b64enc(json)};
      if(sha) body.sha=sha;
      const res=await fetch(url,{method:'PUT',headers:ghH(),body:JSON.stringify(body)});
      if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.message||`HTTP ${res.status}`);}
      setSync('ok',T('已发布 ','Published ')+count+' → '+filename);
      return;
    }catch(e){
      setSync('error',T('发布失败：','Publish failed: ')+e.message+T(' — 改为下载',' — downloading instead'));
    }
  }
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const el=document.createElement('a');el.href=url;el.download=filename;el.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}
function openDetail(id){detailId=id;view='detail';render();}
function setDetailTier(t){
  const a=albums.find(x=>x.id===detailId);if(!a)return;
  a.tier=a.tier===t?null:t;save();
  const p=document.getElementById('detail-tier-pills');if(p)p.innerHTML=tierPillsHTML(a.tier||'','setDetailTier',true);
}
function toggleGreatDetail(trackId){
  const a=albums.find(x=>x.id===detailId);if(!a)return;
  const t=a.tracks.find(x=>x.id===trackId);if(!t)return;
  t.isGreat=!t.isGreat;save();
  const c=document.getElementById('detail-tracks');
  if(c)c.innerHTML=a.tracks.map((tk,i)=>`<div class="track-row${tk.isGreat?' great':''}" onclick="toggleGreatDetail('${tk.id}')"><span class="track-num">${String(i+1).padStart(2,'0')}</span><span class="track-name">${esc(tk.name)}</span>${tk.isGreat?'<span class="star">★</span>':''}</div>`).join('');
  const gc=a.tracks.filter(t=>t.isGreat).length;
  let chip=document.getElementById('gc-chip');const meta=document.getElementById('meta-chips');
  if(gc){if(!chip&&meta){chip=document.createElement('span');chip.id='gc-chip';chip.className='chip';chip.style.color='var(--acc)';meta.appendChild(chip);}if(chip)chip.textContent=`· ★ ${gc} fav${gc!==1?'s':''}`;}
  else{if(chip)chip.remove();}
}
function deleteAlbum(id){
  if(!confirm(T('移除这张专辑？','Remove this album?')))return;
  albums=albums.filter(a=>a.id!==id);save();view='main';render();
}
function promptShelve(id){
  const a=albums.find(x=>x.id===id); if(!a) return;
  if(a.shelved){ unshelveAlbum(id); return; }
  const note=prompt(T('添加备注（可选）：','Add a note (optional):'))||'';
  shelveAlbum(id,note);
}
function shelveAlbum(id,note){
  const a=albums.find(x=>x.id===id); if(!a) return;
  a.shelved=true; a.shelvedNote=note||''; a.tier=null;
  save(); view='main'; activeTab='shelved'; render();
}
function unshelveAlbum(id){
  const a=albums.find(x=>x.id===id); if(!a) return;
  a.shelved=false; a.shelvedNote='';
  save(); view='main'; activeTab='collection'; render();
}
function updateShelvedNote(id,note){
  const a=albums.find(x=>x.id===id); if(!a) return;
  a.shelvedNote=note; save();
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadLocal();
loadGHConfig();

if(ghReady()){
  syncMsg=T('连接中…','Connecting…');
  render();
  ghLoad();
}else{
  // First visit or not configured — go straight to settings
  view='settings';
  render();
}
</script>
